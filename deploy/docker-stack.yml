version: "3.7"

## ================================================================
## CRM IMOBILIÁRIO — PORTAINER STACK (Docker Swarm + Traefik)
## ================================================================
## Pré-requisitos no Portainer antes de subir:
##   docker network create --driver overlay --attachable inoovawebpro  (se não existir)
##   docker volume create crm_postgres_data
##   docker volume create crm_redis_data
##   docker volume create crm_baileys_storage
##   docker volume create crm_rails_storage
## ================================================================

services:

  ## --------------------------- BANCO DE DADOS --------------------------- ##

  crm_db:
    image: postgres:17-alpine

    environment:
      - POSTGRES_USER=crm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=crm_production

    volumes:
      - crm_postgres_data:/var/lib/postgresql/data

    networks:
      - inoovawebpro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M

  ## --------------------------- REDIS --------------------------- ##

  crm_redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes

    volumes:
      - crm_redis_data:/data

    networks:
      - inoovawebpro

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  ## --------------------------- WHATSAPP (BAILEYS) --------------------------- ##

  crm_baileys:
    image: ghcr.io/fazer-ai/baileys-api:latest
    command:
      - sh
      - "-c"
      - "bun manage-api-keys create user ${BAILEYS_API_KEY} && bun start"

    environment:
      - NODE_ENV=production
      - PORT=3025
      - REDIS_URL=redis://:${REDIS_PASSWORD}@crm_redis:6379/1
      - LOG_LEVEL=warn
      - BAILEYS_LOG_LEVEL=error
      - BAILEYS_PROVIDER_DEFAULT_API_KEY=${BAILEYS_API_KEY}
      - IGNORE_GROUP_MESSAGES=true
      - IGNORE_STATUS_MESSAGES=true

    volumes:
      - crm_baileys_storage:/app/storage

    networks:
      - inoovawebpro

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  ## --------------------------- BACKEND RAILS --------------------------- ##

  crm_backend:
    image: ghcr.io/balbiss/crm-backend:latest
    command: >
      bash -c "bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0 -p 80"

    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgres://crm:${POSTGRES_PASSWORD}@crm_db:5432/crm_production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@crm_redis:6379/0
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - API_HOST=${BACKEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - BAILEYS_API_URL=http://crm_baileys:3025
      - BAILEYS_API_KEY=${BAILEYS_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - APP_NAME=${APP_NAME}
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - TZ=America/Sao_Paulo

    volumes:
      - crm_rails_storage:/rails/storage

    networks:
      - inoovawebpro

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 1024M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - traefik.enable=true
        - traefik.http.routers.crm_backend.rule=Host(`api-crmchat.visitaia.com.br`)
        - traefik.http.routers.crm_backend.entrypoints=websecure
        - traefik.http.routers.crm_backend.tls.certresolver=letsencryptresolver
        - traefik.http.routers.crm_backend.service=crm_backend
        - traefik.http.services.crm_backend.loadbalancer.server.port=80
        - traefik.http.services.crm_backend.loadbalancer.passHostHeader=1

  ## --------------------------- WORKER (JOBS) --------------------------- ##

  crm_worker:
    image: ghcr.io/balbiss/crm-backend:latest
    command: bundle exec rails jobs:work

    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgres://crm:${POSTGRES_PASSWORD}@crm_db:5432/crm_production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@crm_redis:6379/0
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - BAILEYS_API_URL=http://crm_baileys:3025
      - BAILEYS_API_KEY=${BAILEYS_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RAILS_LOG_TO_STDOUT=true
      - TZ=America/Sao_Paulo

    volumes:
      - crm_rails_storage:/rails/storage

    networks:
      - inoovawebpro

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M

  ## --------------------------- FRONTEND VUE --------------------------- ##

  crm_frontend:
    image: ghcr.io/balbiss/crm-frontend:latest

    environment:
      - API_URL=${BACKEND_URL}
      - APP_NAME=${APP_NAME}
      - APP_LOGO_URL=${APP_LOGO_URL}
      - APP_PRIMARY_COLOR=${APP_PRIMARY_COLOR}
      - APP_ACCENT_COLOR=${APP_ACCENT_COLOR}
      - APP_SUPPORT_EMAIL=${APP_SUPPORT_EMAIL}
      - APP_FOOTER_TEXT=${APP_FOOTER_TEXT}

    networks:
      - inoovawebpro

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - traefik.enable=true
        - traefik.http.routers.crm_frontend.rule=Host(`crmchat.visitaia.com.br`)
        - traefik.http.routers.crm_frontend.entrypoints=websecure
        - traefik.http.routers.crm_frontend.tls.certresolver=letsencryptresolver
        - traefik.http.routers.crm_frontend.service=crm_frontend
        - traefik.http.services.crm_frontend.loadbalancer.server.port=80
        - traefik.http.services.crm_frontend.loadbalancer.passHostHeader=1

## ================================================================

volumes:
  crm_postgres_data:
    external: true
    name: crm_postgres_data
  crm_redis_data:
    external: true
    name: crm_redis_data
  crm_baileys_storage:
    external: true
    name: crm_baileys_storage
  crm_rails_storage:
    external: true
    name: crm_rails_storage

networks:
  inoovawebpro:
    external: true
    name: inoovawebpro
